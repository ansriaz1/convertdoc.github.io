<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandMaster AI | Auto-Download Kit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; text-align: center; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        
        .input-group { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        .btn-main { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }

        /* The Designs */
        #brand-results { display: none; }
        .preview-box { background: white; color: black; width: 350px; height: 350px; margin: 20px auto; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        .business-card { width: 350px; height: 200px; background: #111; color: white; border-left: 8px solid var(--gold); padding: 20px; text-align: left; box-sizing: border-box; }
        
        .watermark { position: absolute; font-size: 30px; color: rgba(0,0,0,0.1); transform: rotate(-30deg); font-weight: 900; pointer-events: none; z-index: 10; }
        
        /* Payment Area */
        #pay-wall { display: none; background: white; color: black; padding: 25px; border-radius: 20px; margin-top: 20px; }
        .download-btn { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="color: var(--gold);">BRANDMASTER AI</h1>
        <p style="font-size: 14px; opacity: 0.7;">Instant Professional Brand Kit</p>

        <div class="input-group">
            <input type="text" id="bizName" placeholder="Business Name">
            <input type="text" id="bizType" placeholder="Business Type (e.g. Food, Tech)">
            <button class="btn-main" onclick="generateAssets()">GENERATE BRAND KIT ✨</button>
        </div>

        <div id="brand-results">
            <div class="preview-box" id="logoArea">
                <div class="watermark">PRO VERSION</div>
                <div id="icon" style="font-size: 60px;">✨</div>
                <h2 id="lName" style="margin: 10px 0; font-family: serif;">NAME</h2>
                <small style="letter-spacing: 3px;">PREMIUM QUALITY</small>
            </div>

            <div id="pay-wall">
                <h3>✅ Brand Kit Ready!</h3>
                <p style="font-size: 13px;">Pay <b>Rs. 200</b> to remove watermarks and download.</p>
                <div style="background:#eee; padding:10px; border-radius:10px; font-weight:bold; margin-bottom:10px;">
                    Easypaisa: 0314-9664324
                </div>
                <a href="https://wa.me/923149664324?text=Paid%20200%20for%20Logo." style="color: #25D366; font-weight:bold; text-decoration:none;">Get Code on WhatsApp</a>
                
                <input type="text" id="uCode" placeholder="Enter Code" style="background:#f4f4f4; text-align:center; color:black;">
                <button class="btn-main" onclick="unlock()">VERIFY CODE</button>
                
                <button id="dlBtn" class="download-btn" onclick="saveImage()">⬇️ DOWNLOAD LOGO TO GALLERY</button>
            </div>
        </div>
    </div>

<script>
    function generateAssets() {
        const name = document.getElementById('bizName').value;
        const type = document.getElementById('bizType').value.toLowerCase();
        if(!name || !type) return alert("Please fill fields!");

        document.getElementById('brand-results').style.display = 'block';
        document.getElementById('pay-wall').style.display = 'block';
        document.getElementById('lName').innerText = name.toUpperCase();

        if(type.includes("food")) document.getElementById('icon').innerText = "🍔";
        else if(type.includes("cloth")) document.getElementById('icon').innerText = "👗";
        else if(type.includes("mobile")) document.getElementById('icon').innerText = "📱";
        else document.getElementById('icon').innerText = "⭐";
    }

    function unlock() {
        const code = document.getElementById('uCode').value.toUpperCase();
        if(code === "VIP200") {
            // Remove Watermarks
            document.querySelectorAll('.watermark').forEach(w => w.style.display = 'none');
            // Show Download Button
            document.getElementById('dlBtn').style.display = 'block';
            alert("Payment Verified! You can now click the Green Download button.");
        } else {
            alert("Invalid Code!");
        }
    }

    function saveImage() {
        const logoArea = document.getElementById('logoArea');
        html2canvas(logoArea).then(canvas => {
            const link = document.createElement('a');
            link.download = 'My_Professional_Logo.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>

</body>
</html>
